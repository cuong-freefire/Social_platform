<app-navbar></app-navbar>

<div class="post-detail-wrapper">
    <div class="post-detail-container">
        <div class="max-w-xl mx-auto py-4">
            <!-- Nút quay lại tinh tế hơn -->
            <div class="flex align-items-center mb-3">
                <button pButton 
                    icon="pi pi-arrow-left" 
                    label="Quay lại" 
                    class="p-button-text p-button-sm back-btn" 
                    (click)="goBack()"
                ></button>
            </div>

            @if (loading) {
                <div class="flex justify-center p-8">
                    <p-progressSpinner strokeWidth="4" fill="transparent" animationDuration=".5s" [style]="{width: '50px', height: '50px'}"></p-progressSpinner>
                </div>
            } @else if (error) {
                <div class="error-box p-6 text-center border-round-xl">
                    <i class="pi pi-exclamation-circle text-4xl text-red-500 mb-3"></i>
                    <h3 class="text-xl font-bold text-white mb-2">Đã xảy ra lỗi</h3>
                    <p class="text-gray-400 mb-4">{{ error }}</p>
                    <button pButton label="Về trang chủ" icon="pi pi-home" class="p-button-outlined" (click)="goBack()"></button>
                </div>
            } @else if (post) {
                <div class="fade-in">
                    <app-post [post]="post" [showComments]="true"></app-post>
                </div>
            }
        </div>
    </div>
</div>
