<app-navbar />
<p-toast />

<div class="home-container">
    <div class="home-grid-layout px-3 sm:px-4">
        <!-- Sidebar bên trái - Fun features -->
        <div class="left-sidebar">
            <div class="sidebar-content flex flex-column gap-4 py-5">
                <!-- Widget Cảm hứng -->
                <div class="fun-card inspiration-card p-4 border-round-xl shadow-2">
                    <div class="flex align-items-center gap-2 mb-3">
                        <i class="pi pi-sparkles text-yellow-500 text-xl"></i>
                        <span class="font-bold text-lg">Cảm hứng</span>
                    </div>
                    <p class="quote-text italic mb-3 text-gray-300">"{{ currentQuote }}"</p>
                    <div class="flex justify-content-end">
                        <button pButton 
                            icon="pi pi-refresh" 
                            class="p-button-text p-button-rounded p-button-sm hover:rotate-180" 
                            (click)="generateQuote()"
                            pTooltip="Đổi câu khác"
                        ></button>
                    </div>
                </div>
                
                <!-- Widget Thống kê -->
                <div class="fun-card stats-card p-4 border-round-xl shadow-2">
                    <div class="flex align-items-center justify-content-between mb-3">
                        <div class="flex align-items-center gap-2">
                            <i class="pi pi-chart-line text-blue-500 text-xl"></i>
                            <span class="font-bold text-lg">Hoạt động</span>
                        </div>
                        <div class="level-badge bg-blue-500 text-white px-2 py-1 border-round-lg font-bold text-xs">
                            LV {{ userLevel }}
                        </div>
                    </div>
                    <div class="flex justify-content-between mb-2 text-sm">
                        <span>Bài viết đã đọc</span>
                        <span class="font-bold text-blue-400">{{ postsReadCount }}</span>
                    </div>
                    <p-progressBar [value]="progressToNextLevel" [showValue]="false" styleClass="h-0.5rem mb-2"></p-progressBar>
                    <div class="text-xs text-gray-500 flex align-items-center gap-1">
                        <i class="pi pi-info-circle"></i>
                        <span>Cố lên! {{ postsRemainingToNextLevel }} bài nữa để lên cấp.</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Nội dung chính (Bài đăng) -->
        <div class="main-content-area py-4 sm:py-5">
            <div class="flex flex-column gap-4 sm:gap-5 align-items-center w-full max-w-30rem mx-auto">
                <!-- Nút tạo post mới -->
                <div class="w-full flex justify-content-center mb-2">
                    <button pButton 
                        label="Bạn đang nghĩ gì?" 
                        icon="pi pi-plus" 
                        class="p-button-rounded p-button-outlined w-full bg-surface-800 border-surface-700 text-gray-400 text-left justify-content-start px-4 h-3rem hover:bg-surface-700"
                        (click)="showCreateDialog()"
                    ></button>
                </div>

                <!-- List of Posts -->
                @for (post of posts$ | async; track post._id) {
                    <app-post [post]="post" class="w-full" />
                }

                <!-- Bottom element for IntersectionObserver -->
                <div #bottom class="h-1rem w-full"></div>
            </div>
        </div>

        <!-- Sidebar bên phải - Nút điều hướng cố định -->
        <div class="right-sidebar">
            <div class="sidebar-content flex flex-column gap-3 py-5">
                <div class="fixed-navigation-buttons flex flex-column gap-3">
                    <button pButton 
                        icon="pi pi-chevron-up" 
                        class="p-button-rounded p-button-secondary p-button-outlined shadow-4 nav-btn"
                        (click)="scrollToPreviousPost()"
                        pTooltip="Bài trước"
                        tooltipPosition="left"
                    ></button>
                    <button pButton 
                        icon="pi pi-chevron-down" 
                        class="p-button-rounded p-button-secondary p-button-outlined shadow-4 nav-btn"
                        (click)="scrollToNextPost()"
                        pTooltip="Bài tiếp theo"
                        tooltipPosition="left"
                    ></button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Dialog tạo post mới -->
<p-dialog 
    header="Tạo bài viết mới" 
    [(visible)]="displayCreateDialog" 
    (onHide)="cancelForm()"
    [modal]="true" 
    [draggable]="false" 
    [resizable]="false"
    styleClass="create-post-dialog bg-surface-900 border-surface-700 text-white"
    [style]="{width: '450px'}"
>
    <div class="flex flex-column gap-4 py-3">
        <div class="flex flex-column gap-2">
            <label for="title" class="text-sm font-semibold">Tiêu đề</label>
            <input 
                pInputText 
                id="title" 
                [(ngModel)]="newPostTitle" 
                placeholder="Nhập tiêu đề..." 
                class="bg-surface-800 border-surface-700 text-white"
            />
        </div>

        <div class="flex flex-column gap-2">
            <label for="content" class="text-sm font-semibold">Nội dung</label>
            <textarea 
                pTextarea
                id="content" 
                [(ngModel)]="newPostContent" 
                placeholder="Bạn đang nghĩ gì?" 
                [autoResize]="true"
                rows="4"
                class="bg-surface-800 border-surface-700 text-white"
            ></textarea>
        </div>

        <div class="flex flex-column gap-2">
            <label class="text-sm font-semibold">Hình ảnh (tùy chọn)</label>
            <p-fileUpload 
                mode="basic" 
                chooseLabel="Chọn ảnh" 
                chooseIcon="pi pi-upload"
                accept="image/*" 
                maxFileSize="5000000" 
                (onSelect)="onFileSelect($event)"
                auto="true"
                class="w-full"
            ></p-fileUpload>
            
            @if (imagePreview) {
                <div class="mt-2 border-round-lg overflow-hidden border-1 border-surface-700">
                    <img [src]="imagePreview" alt="Preview" class="w-full block" style="max-height: 200px; object-fit: cover;" />
                </div>
            }
        </div>
    </div>

    <ng-template pTemplate="footer">
        <div class="flex justify-content-end gap-2">
            <button pButton label="Hủy" class="p-button-text p-button-secondary" (click)="cancelForm()" [disabled]="isPosting"></button>
            <button pButton 
                label="Đăng bài" 
                [loading]="isPosting" 
                class="p-button-primary p-button-rounded px-4"
                [disabled]="!newPostTitle.trim() || !newPostContent.trim()"
                (click)="submitPost()"
            ></button>
        </div>
    </ng-template>
</p-dialog>
