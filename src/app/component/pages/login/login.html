<div class="flex align-items-center justify-content-center h-screen surface-ground">
    <p-toast />

    <form [formGroup]="loginForm" (ngSubmit)="login()"
        class="surface-card p-5 shadow-3 border-round w-23rem h-25rem flex flex-column gap-4 border-1 border-primary-500">

        <h2 class="text-center m-0">Đăng nhập</h2>

        <p-iftalabel class="w-full">
            <input pInputText id="username" formControlName="username" autocomplete="off" class="w-full"
                [invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched" />
            <label for="username">Username</label>
        </p-iftalabel>

        <p-iftalabel class="w-full">
            <input pInputText id="password" type="password" formControlName="password" autocomplete="off" class="w-full"
                [invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" />
            <label for="password">Password</label>
        </p-iftalabel>

        <p-button type="submit" label="Sign in" styleClass="w-full p-3">
        </p-button>

        <div>
            <p class="text-center">Bạn chưa đăng ký ? <a [routerLink]="['/register']">Đăng ký ngay</a></p>
        </div>
    </form>

</div>
