<p-toast />
<p-card styleClass="modern-post-card mb-4 shadow-2 border-round-xl overflow-hidden">
    <!-- Header: User Info -->
    <ng-template pTemplate="header">
        <div class="flex align-items-center p-3 gap-3 bg-surface-800 border-bottom-1 border-surface-700 cursor-pointer" (click)="goToDetail(post.user?._id)">
            <p-avatar 
                [image]="post.user?.image || 'https://primefaces.org/cdn/primeng/images/demo/avatar/amyelsner.png'" 
                shape="circle" 
                size="large"
            />
            <div class="flex flex-column">
                <span class="font-bold text-lg text-white hover:underline">{{ post.user?.name ?? post.user?.username ?? 'Người dùng' }}</span>
                <span class="text-xs text-gray-400">{{ post.createdAt | date:'short' }}</span>
            </div>
        </div>
    </ng-template>

    <!-- Content -->
    <div class="post-content p-3">
        <h3 class="mt-0 mb-2 text-white">{{ post.title }}</h3>
        <p class="text-gray-300 line-height-3 m-0">{{ post.content }}</p>
        
        @if (post.image) {
            <div class="mt-3 border-round-lg overflow-hidden border-1 border-surface-700">
                <img [src]="post.image" alt="Post Image" class="w-full block" style="max-height: 400px; object-fit: cover;" />
            </div>
        }
    </div>

    <!-- Footer: Actions -->
    <ng-template pTemplate="footer">
        <div class="flex flex-column gap-3">
            <div class="flex align-items-center justify-content-between pt-2 border-top-1 border-surface-700">
                <div class="flex gap-2">
                    <button pButton 
                        [icon]="isLiked() ? 'pi pi-thumbs-up-fill' : 'pi pi-thumbs-up'" 
                        [label]="isLiked() ? 'Thích' : 'Thích'"
                        [class]="isLiked() ? 'p-button-primary action-btn' : 'p-button-text p-button-secondary action-btn'"
                        (click)="onLike('like')"
                    >
                        <span class="ml-2 font-medium">{{ post.likes?.length ?? 0 }}</span>
                    </button>
                    <button pButton 
                        [icon]="isDisliked() ? 'pi pi-thumbs-down-fill' : 'pi pi-thumbs-down'" 
                        [class]="isDisliked() ? 'p-button-danger action-btn' : 'p-button-text p-button-secondary action-btn'"
                        (click)="onLike('dislike')"
                    >
                        <span class="ml-2 font-medium">{{ post.dislikes?.length ?? 0 }}</span>
                    </button>
                </div>
                
                <button pButton 
                    icon="pi pi-comment" 
                    label="Bình luận" 
                    class="p-button-text p-button-secondary action-btn"
                    (click)="toggleComments()"
                ></button>
            </div>

            <!-- Comments Section -->
            @if (showComments) {
                <div class="comments-container mt-2 pt-3 border-top-1 border-surface-700">
                    <app-comments [postId]="post._id" />
                </div>
            }
        </div>
    </ng-template>
</p-card>
